body:
  text: 東晉天竺三藏竺曇無蘭譯昔者世尊遊羅閲祇説經散慧初語亦善中語亦善竟語亦善其義微妙淨修梵行所講廣普時王便給使數十餘人常採好花以給王家後宮貴人婇女大小一日俱出城外採華欲還入城路徑遇佛遙見世尊相好威光巍巍無量猶星中月若日初出照于天下與聖衆俱弟子菩薩前後圍繞往詣佛所稽首為禮心自念言人命難保佛世難遇經法難值今遭大聖猶病者得良醫身既貧賤加屬縣官羈役之患恆不自從國王嚴急主給採花常以早進設失時節或能見誅日不再中聖衆難遇億世時有寧棄身命以花上佛并散聖衆因受經戒聽省深法無窮之慧我於無數劫為人所害不可稱載未曾為法而惜身命今供世尊三寶之業縱使見害不墮苦痛必生安處便以華散佛及聖衆上却自歸命一心重禮佛知其念發大道意甚慈愍之具為散講大乘之法六度無極四等四恩三脫菩薩時諸採華人皆發無上正真道意心解佛慧至不退轉無所從生佛即授決後當得佛號曰妙華如來至真等正覺明行成為善逝世間解無上士道法御天人師號佛世尊其邊人聞莫不怡悅啓受大法供奉三寶時採華夫供養受決稽首佛足還歸家中與家二親妻子辭別我今命盡為王見殺父母愕然問何罪咎諸子答曰為王所使行採諸華中遙見佛以華貢上王大嚴急既違失時復無有華必見危命故辭別耳二親聞之益以愁戚當奈之何發篋視之滿中好華須曼雜香香薰鬱鬱遠徹四面父母告曰可以進王諸子各曰衆人見之必傳至王又復違時恐不得安時王大瞋見不時來復散衆華遣邊大臣多將人兵收取將來則受王教反縛入宮罪當棄市諸人不恐面色不變王怪問之汝等罪過命在不測縛來當殺何故不懅面色不改即白王曰人生有死物成有敗我從無數劫每以非法不惜身命朝早採華值遇世尊以華供上稽首歸命爾時以知違令當死寧以有德而死不以無德而存還視華篋續滿如故皆是如來恩仁所覆王甚怪之心不信然故往詣佛稽首足下却坐一面叉手問佛有是意不佛言然王此人至心欲度十方不惜身命故取衆華以散上佛意無想報以得受決將來成佛號曰妙華至真等正覺用發大意受決之故慈心之香華滿篋器莫不聞知王大歡喜疾解衆縛悔過自責愚意不及繫縛菩薩惟原其罪佛言善哉善哉能自改者與無過同佛説如是王及臣民莫不悅豫作禮而去
